<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">

    <h1>🌦️ Weather App</h1>

    <button id="locationBtn">Get My Weather</button>

    <div class="card">
      <p id="status">Click button to get weather</p>

      <h2 id="city">--</h2>
      <h3 id="temp">--°C</h3>
      <p id="desc">---</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
